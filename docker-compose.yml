services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: echomind-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: echomind-postgres
    environment:
      POSTGRES_USER: echomind
      POSTGRES_PASSWORD: echomind
      POSTGRES_DB: echomind
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echomind"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: echomind-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: echomind-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://echomind:echomind@postgres:5432/echomind
      QDRANT_MODE: server
      QDRANT_URL: http://qdrant:6333
      CACHE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      MODEL_CACHE_DIR: /models
    ports:
      - "8000:8000"
    volumes:
      - model_cache:/models
      - ./data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: echomind-worker
    environment:
      DATABASE_URL: postgresql+psycopg://echomind:echomind@postgres:5432/echomind
      QDRANT_MODE: server
      QDRANT_URL: http://qdrant:6333
      MODEL_CACHE_DIR: /models
    volumes:
      - model_cache:/models
      - ./data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["python", "-m", "echomind_worker.cli", "watch"]

  ui:
    build:
      context: .
      dockerfile: services/ui/Dockerfile
    container_name: echomind-ui
    environment:
      ECHOMIND_API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

volumes:
  qdrant_data:
  pg_data:
  model_cache:
