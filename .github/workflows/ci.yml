name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Sync dependencies
        run: uv sync --all-extras
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --all-extras
      - name: mypy
        run: uv run mypy packages services

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg libsndfile1
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --all-extras
      - name: pytest
        run: uv run pytest -m "not slow and not integration" --maxfail=1
      - name: Upload coverage
        if: matrix.python == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            .coverage
            coverage.xml

  docker:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          push: false
          tags: echomind/api:ci
      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/worker/Dockerfile
          push: false
          tags: echomind/worker:ci
      - name: Build UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/ui/Dockerfile
          push: false
          tags: echomind/ui:ci
