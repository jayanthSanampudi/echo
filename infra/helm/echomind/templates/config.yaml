apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "echomind.fullname" . }}-config
  labels:
    {{- include "echomind.labels" . | nindent 4 }}
data:
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  WHISPER_MODEL: {{ .Values.config.whisperModel | quote }}
  TEXT_EMBED_MODEL: {{ .Values.config.textEmbedModel | quote }}
  AUDIO_EMBED_MODEL: {{ .Values.config.audioEmbedModel | quote }}
  LLM_PROVIDER: {{ .Values.config.llmProvider | quote }}
  QDRANT_MODE: "server"
  QDRANT_URL: "http://{{ include "echomind.fullname" . }}-qdrant:6333"
  CACHE_BACKEND: "redis"
  REDIS_URL: "redis://{{ include "echomind.fullname" . }}-redis:6379/0"
  ENABLE_PROMETHEUS: {{ .Values.config.enablePrometheus | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "echomind.fullname" . }}-secrets
  labels:
    {{- include "echomind.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: "postgresql+psycopg://{{ .Values.postgres.credentials.user }}:{{ .Values.postgres.credentials.password }}@{{ include "echomind.fullname" . }}-postgres:5432/{{ .Values.postgres.credentials.database }}"
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  NVIDIA_API_KEY: {{ .Values.secrets.nvidiaApiKey | quote }}
  QDRANT_API_KEY: {{ .Values.secrets.qdrantApiKey | quote }}
