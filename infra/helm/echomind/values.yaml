# EchoMind Helm chart values

image:
  registry: ghcr.io
  repository: echomind
  tag: latest
  pullPolicy: IfNotPresent

api:
  replicaCount: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70

worker:
  replicaCount: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi

ui:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

qdrant:
  storage: 10Gi

postgres:
  storage: 10Gi
  credentials:
    user: echomind
    password: changeme
    database: echomind

ingress:
  enabled: true
  host: echomind.local
  className: nginx

config:
  whisperModel: tiny
  textEmbedModel: sentence-transformers/all-MiniLM-L6-v2
  audioEmbedModel: laion/clap-htsat-unfused
  llmProvider: mock
  enablePrometheus: true

secrets:
  openaiApiKey: ""
  anthropicApiKey: ""
  nvidiaApiKey: ""
  qdrantApiKey: ""
