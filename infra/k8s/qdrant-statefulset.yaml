apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: echomind
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels: { app: qdrant }
  template:
    metadata:
      labels: { app: qdrant }
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.11.0
          ports:
            - { containerPort: 6333, name: http }
            - { containerPort: 6334, name: grpc }
          volumeMounts:
            - { name: data, mountPath: /qdrant/storage }
          readinessProbe:
            httpGet: { path: /healthz, port: 6333 }
            initialDelaySeconds: 10
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits: { cpu: "1", memory: "2Gi" }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: echomind
spec:
  selector: { app: qdrant }
  ports:
    - { name: http, port: 6333, targetPort: 6333 }
    - { name: grpc, port: 6334, targetPort: 6334 }
