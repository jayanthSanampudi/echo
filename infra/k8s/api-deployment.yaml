apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: echomind
  labels: { app: api }
spec:
  replicas: 2
  selector:
    matchLabels: { app: api }
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels: { app: api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: echomind/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8000, name: http }
          envFrom:
            - configMapRef: { name: echomind-config }
            - secretRef:    { name: echomind-secrets }
          volumeMounts:
            - { name: models, mountPath: /models }
          readinessProbe:
            httpGet: { path: /ready, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 30
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "2",    memory: "2Gi"   }
      volumes:
        - name: models
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: echomind
spec:
  selector: { app: api }
  ports:
    - { name: http, port: 80, targetPort: 8000 }
