apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: echomind
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_USER, value: echomind }
            - { name: POSTGRES_PASSWORD, value: echomind }
            - { name: POSTGRES_DB, value: echomind }
          ports:
            - { containerPort: 5432 }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "echomind"] }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: echomind
spec:
  selector: { app: postgres }
  ports:
    - { port: 5432, targetPort: 5432 }
