[project]
name = "echomind-core"
version = "0.1.0"
description = "Shared core library for EchoMind: config, DB, vector store, audio utils."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "qdrant-client>=1.11",
    "numpy>=1.26",
    "librosa>=0.10",
    "soundfile>=0.12",
    "structlog>=24.1",
    "tenacity>=8.5",
    "diskcache>=5.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["echomind_core"]
