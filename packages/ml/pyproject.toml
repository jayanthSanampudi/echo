[project]
name = "echomind-ml"
version = "0.1.0"
description = "ML model wrappers for EchoMind: Whisper ASR, embeddings, RAG, two-tower recommender."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "echomind-core",
    "torch>=2.3",
    "transformers>=4.43",
    "sentence-transformers>=3.0",
    "openai-whisper>=20231117",
    "scikit-learn>=1.5",
    "numpy>=1.26",
    "pandas>=2.2",
    "httpx>=0.27",
]

[project.optional-dependencies]
openai = ["openai>=1.40"]
anthropic = ["anthropic>=0.34"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["echomind_ml"]
